<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodingBat</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dropdown.css">
    <link rel="stylesheet" href="../css/login.css">

<body>
    <div class="center">
        <div class="header-split-left">
            <div class="logo">
                <img src="../assets/source-code.svg" style="font-size: 3em;" id="logo-svg"/>
                <a href="/" style="font-size: 3em;">
                    <div id="logo-text">
                        CodingBat
                    </div>

        </div>

        <div class="header-split-right">
            <!-- <div id="lang-switch"> -->
            <!--     java/python -->
            <!-- </div> -->
            <div id="login">
                <div class="login-center" style="font-size: 1.2em; font-weight: bold;">Login</div>
                <div id="login-input">
                    ID/Email: <input id="username" type="text" value="username123">
                    Password: <input id="password" type="password" value="password">
                    <!-- <br><input type="button" value="Submit" style="margin-top: 1em;" onclick="window.location.href='../?login='"> -->
                    <br><input type="button" value="Submit" style="margin-top: 1em;" onclick="goPrevLoggedIn()">

                <div class="login-center" style="font-size: 0.9em; margin-top: 3em">
                    <a href="#">Forgot Password</a> | <a href="../signup">Create Account</a>
                </div>
            </div>
        </div>
    </div>
